<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WithHer - Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #fff5f8; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .navbar { background: linear-gradient(135deg, #ff6b9d, #c44569); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .navbar-brand { color: white; text-decoration: none; font-weight: bold; font-size: 1.2rem; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-size: 0.9rem; }
        .chat-container {
            display: flex;
            height: calc(100vh - 56px);
            max-width: 900px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 30px rgba(0,0,0,0.1);
        }
        .conversations-panel {
            width: 280px;
            border-right: 1px solid #ffecf1;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .conversations-header {
            padding: 18px 20px;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }
        .conversations-list { overflow-y: auto; flex: 1; }
        .conversation-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #fff5f8;
            transition: background 0.2s;
        }
        .conversation-item:hover, .conversation-item.active { background: #fff0f5; }
        .conversation-item .name { font-weight: bold; color: #333; font-size: 0.88rem; }
        .conversation-item .preview {
            color: #aaa; font-size: 0.78rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .unread-badge {
            background: #ff6b9d; color: white;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 0.65rem; display: inline-flex;
            align-items: center; justify-content: center;
            margin-left: 6px;
        }
        .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid #ffecf1;
            font-weight: bold; color: #c44569;
            background: #fff8fb; font-size: 0.95rem;
        }
        .chat-messages {
            flex: 1; overflow-y: auto;
            padding: 20px; display: flex;
            flex-direction: column; gap: 8px;
        }
        .message-row { display: flex; flex-direction: column; }
        .message-bubble {
            max-width: 68%; padding: 10px 14px;
            border-radius: 18px; font-size: 0.87rem; line-height: 1.45;
            word-break: break-word;
        }
        .message-bubble.mine {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white; align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-bubble.theirs {
            background: #f5f5f5; color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 0.68rem; color: #bbb;
            margin-top: 3px; padding: 0 4px;
        }
        .message-time.mine { text-align: right; }
        .chat-input-area {
            padding: 14px 18px;
            border-top: 1px solid #ffecf1;
            display: flex; gap: 10px; align-items: center;
        }
        .chat-input-area input {
            flex: 1; border: 1.5px solid #ffccd5;
            border-radius: 25px; padding: 10px 18px;
            outline: none; font-size: 0.88rem;
        }
        .chat-input-area input:focus { border-color: #ff6b9d; }
        .send-btn {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white; border: none; border-radius: 50%;
            width: 42px; height: 42px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover { opacity: 0.88; }
        .no-chat {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #ddd; text-align: center; padding: 30px;
        }
        .no-chat i { font-size: 3.5rem; margin-bottom: 12px; }
        .no-chat p { font-size: 0.9rem; color: #ccc; }
        .empty-list { padding: 20px; text-align: center; color: #ccc; font-size: 0.82rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/dashboard">WithHer 💗</a>
    <div class="nav-links">
        <a href="/dashboard"><i class="bi bi-house"></i> Home</a>
        <a href="/forum"><i class="bi bi-chat-dots"></i> Forum</a>
        <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="chat-container">
    <!-- Sidebar -->
    <div class="conversations-panel">
        <div class="conversations-header">💬 Messages</div>
        <div class="conversations-list" id="conversationsList">
            <div class="empty-list">Loading...</div>
        </div>
    </div>

    <!-- Chat area -->
    <div class="chat-panel" id="chatPanel">
        <div class="no-chat" id="noChatSelected">
            <i class="bi bi-chat-heart"></i>
            <p>Select a conversation to start chatting</p>
        </div>
        <div id="activeChatArea" style="display:none; flex-direction:column; flex:1; min-height:0;">
            <div class="chat-header" id="chatHeader">💗</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." 
                    onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Get current user from session via API
    let currentUserId = null;
    let currentReceiverId = null;
    let currentReceiverName = '';
    let socket = null;

    async function init() {
        // Get current user id
        const res = await fetch('/auth/me');
        if (res.status === 401) return window.location.href = '/login';
        const user = await res.json();
        currentUserId = user.id;

        // Connect socket
        socket = io();
        socket.emit('user_online', currentUserId);

        socket.on('receive_message', (message) => {
            // If chat with this sender is open, show message immediately
            if (message.sender_id == currentReceiverId) {
                appendMessage(message, false);
                scrollToBottom();
                socket.emit('mark_read', { senderId: message.sender_id, receiverId: currentUserId });
            }
            // Refresh conversations to update preview
            loadConversations();
        });

        socket.on('message_sent', (message) => {
            appendMessage(message, true);
            scrollToBottom();
        });

        // Check if we should open a specific conversation (from forum)
        const params = new URLSearchParams(window.location.search);
        const openUserId = params.get('userId');
        const openUserName = params.get('name');

        await loadConversations();

        if (openUserId && openUserName) {
            openChat(openUserId, decodeURIComponent(openUserName));
        }
    }

    async function loadConversations() {
        const res = await fetch('/messages/conversations');
        const conversations = await res.json();
        const list = document.getElementById('conversationsList');

        if (!conversations.length) {
            list.innerHTML = '<div class="empty-list">No conversations yet.<br>Message someone from the forum!</div>';
            return;
        }

        list.innerHTML = conversations.map(c => `
            <div class="conversation-item ${c.id == currentReceiverId ? 'active' : ''}" 
                 onclick="openChat(${c.id}, '${c.full_name}')">
                <div class="d-flex align-items-center justify-content-between">
                    <span class="name">
                        ${c.full_name}
                        ${c.unread > 0 ? `<span class="unread-badge">${c.unread}</span>` : ''}
                    </span>
                </div>
                <div class="preview">${c.last_message || ''}</div>
            </div>
        `).join('');
    }

    async function openChat(userId, userName) {
        currentReceiverId = userId;
        currentReceiverName = userName;

        // Update UI
        document.getElementById('noChatSelected').style.display = 'none';
        const activeArea = document.getElementById('activeChatArea');
        activeArea.style.display = 'flex';
        document.getElementById('chatHeader').innerHTML = `💗 ${userName}`;
        document.getElementById('chatMessages').innerHTML = '';

        // Mark active in sidebar
        document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));

        // Load history
        const res = await fetch(`/messages/history/${userId}`);
        const messages = await res.json();
        messages.forEach(m => appendMessage(m, m.sender_id == currentUserId));
        scrollToBottom();

        // Mark as read
        socket.emit('mark_read', { senderId: userId, receiverId: currentUserId });
        loadConversations();
    }

    function appendMessage(message, isMine) {
        const container = document.getElementById('chatMessages');
        const time = new Date(message.created_at).toLocaleTimeString('en-KE', {
            hour: '2-digit', minute: '2-digit'
        });

        const div = document.createElement('div');
        div.className = 'message-row';
        div.innerHTML = `
            <div class="message-bubble ${isMine ? 'mine' : 'theirs'}">
                ${message.content}
            </div>
            <div class="message-time ${isMine ? 'mine' : ''}">${time}</div>
        `;
        container.appendChild(div);
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content || !currentReceiverId) return;

        socket.emit('send_message', {
            senderId: currentUserId,
            receiverId: currentReceiverId,
            content
        });

        input.value = '';
    }

    function scrollToBottom() {
        const container = document.getElementById('chatMessages');
        container.scrollTop = container.scrollHeight;
    }

    init();
</script>
</body>
</html>
